<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Gold Coins Redeem</title>
  <link rel="stylesheet" href="./gold-coins-exchange.css" />
</head>

<body>
  <!-- Auth failed dialog (shown when code/token missing) -->
  <div id="authFailedModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.55);align-items:center;justify-content:center;padding:20px;">
    <div style="width:100%;max-width:360px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 18px 50px rgba(0,0,0,0.25);">
      <div style="padding:18px 18px 10px;font-weight:800;font-size:16px;color:#111827;">Authorization Failed</div>
      <div style="padding:0 18px 18px;color:#4b5563;font-size:14px;line-height:1.5;">
        Missing token. Please reopen this page from the app and try again.
      </div>
      <div style="padding:0 18px 18px;display:flex;gap:10px;">
        <button id="authFailedOk" type="button" style="flex:1;height:44px;border:none;border-radius:999px;background:linear-gradient(135deg,#ec5b13,#f97316);color:#fff;font-weight:800;cursor:pointer;">OK</button>
      </div>
    </div>
  </div>

  <div class="redeem-root">
    <!-- 顶部导航 -->
    <header class="redeem-header">
      <button class="redeem-back-btn" id="backBtn">←</button>
      <h1 class="redeem-header-title">Gold Coins Redeem</h1>
      <div class="redeem-header-spacer"></div>
    </header>

    <main class="redeem-main">
      <!-- 钱包 / 金币概览 -->
      <section class="redeem-section">
        <div class="redeem-wallet-card">
          <div class="redeem-wallet-left">
            <div class="redeem-wallet-label">My Coins</div>
            <div class="redeem-wallet-value">
              <span id="userGoldCoins">0</span>
              <span class="redeem-wallet-unit">Gold Coins</span>
            </div>
            <div class="redeem-wallet-hint">Use for top-up and more rewards</div>
          </div>
          <div class="redeem-wallet-icon">
            <img src="./icons/gold_coin.svg" alt="coins" class="icon-img">
          </div>
        </div>
      </section>

      <!-- 话费充值兑换 -->
      <section class="redeem-section">
        <h2 class="redeem-section-title">Mobile Top-up</h2>

        <!-- Mobile input -->
        <div class="redeem-field">
          <label class="redeem-label" for="inputMobile">Mobile Number</label>
          <div class="redeem-input-wrapper">
            <button type="button" class="redeem-countrycode-btn" id="countryCodeBtn" aria-label="Country code" disabled>+91</button>
            <input
              id="inputMobile"
              class="redeem-input"
              type="tel"
              inputmode="numeric"
              maxlength="15"
              placeholder="Enter phone number"
            />
          </div>
        </div>

        <!-- Operator (hidden until charges loaded) -->
        <div class="redeem-field" id="operatorSection" style="display:none;">
          <label class="redeem-label">Operator</label>
          <div class="redeem-operator-single">
            <span class="redeem-operator-pill" id="operatorLabel">-</span>
          </div>
        </div>

        <!-- Amount (hidden until charges loaded) -->
        <div class="redeem-field" id="amountSection" style="display:none;">
          <label class="redeem-label">Select Amount</label>
          <div class="redeem-amount-grid" id="amountGrid">
            <!-- Options will be rendered after /charges returns -->
          </div>
        </div>

        <!-- Summary -->
        <div class="redeem-summary" id="redeemSummary">
          Select amount to see coins required
        </div>

        <!-- Redeem button -->
        <button class="redeem-primary-btn redeem-primary-btn--disabled" id="btnRedeem" disabled>
          Redeem Now
        </button>
      </section>

      <!-- Redemption History -->
      <section class="redeem-section redeem-history-section">
        <div class="redeem-history-header">
          <h2 class="redeem-section-title">Redemption History</h2>
          <button type="button" class="redeem-history-view-all" id="viewAllRecords">View All</button>
        </div>
        <div class="redeem-history-list" id="historyList">
          <!-- 历史记录由 JS 动态插入 -->
        </div>
      </section>
    </main>
  </div>

  <div class="modal" id="exchangeModal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Confirm Redeem</h2>
        <button class="modal-close" id="modalCloseBtn">✕</button>
      </div>
      <div class="modal-body">
        <div class="product-preview">
          <div class="preview-icon" id="previewIcon"></div>
          <div class="preview-info">
            <div class="preview-name" id="previewName"></div>
            <div class="preview-points" id="previewPoints"></div>
          </div>
        </div>
        <div class="modal-message">
          <p>Use <span id="confirmPoints"></span> coins to redeem <span id="confirmName"></span>?</p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-confirm" id="confirmBtn">Confirm</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" style="display: none;"></div>

  <!-- Country code picker -->
  <div class="modal" id="countryCodeModal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">Select country code</h2>
        <button class="modal-close" id="countryCodeCloseBtn">✕</button>
      </div>
      <div class="modal-body">
        <div class="redeem-field" style="margin-top:0;">
          <label class="redeem-label" for="countryCodeSearch">Search</label>
          <div class="redeem-input-wrapper">
            <input id="countryCodeSearch" class="redeem-input" type="text" placeholder="Search country or code (e.g. China, +86)" />
          </div>
        </div>
        <div id="countryCodeList" style="margin-top:12px;max-height:320px;overflow:auto;"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { GoldCoinsExchange } from "./gold-coins-exchange.js";
    import { postAuthToken } from "./activity-api.js";
    import * as logger from "./activity-logger.js";

    const qp = new URLSearchParams(window.location.search);
    const tokenFromUrl = qp.get("token") || "";
    const code = qp.get("code") || "";
    const activityId = qp.get("activity_id") || "";

    function showAuthFailedDialog() {
      const modal = document.getElementById("authFailedModal");
      if (modal) modal.style.display = "flex";
      const ok = document.getElementById("authFailedOk");
      if (ok) ok.addEventListener("click", () => {}, { once: true });
    }

    // baseUrl（写死）：后端 API 服务地址（8080）
    const baseUrl = "http://10.0.33.63:8080";
    let token = "";

    // Try reuse token from activity center (code may be one-time)
    try {
      const cachedRaw = sessionStorage.getItem("activity_auth_cache_v1") || "";
      const cached = cachedRaw ? JSON.parse(cachedRaw) : null;
      const expiresAt = Number(cached?.expiresAt || 0); // epoch seconds
      const nowSec = Math.floor(Date.now() / 1000);
      const stillValid = !!cached?.token && (!expiresAt || nowSec < (expiresAt - 30));
      if (stillValid) {
        token = String(cached.token || "");
      }
    } catch (_) {}

    try {
      if (!token) {
        // Prefer URL token; if missing, fallback to code exchange
        token = tokenFromUrl ? String(tokenFromUrl) : "";
      }

      if (!token) {
        if (!code) {
          showAuthFailedDialog();
          throw new Error("Missing token and code in URL");
        }
        const authRes = await postAuthToken({ baseUrl }, { code });
        token = authRes?.data?.access_token || "";
      }
    } catch (e) {
      showAuthFailedDialog();
      throw e;
    }
    if (!token) {
      showAuthFailedDialog();
      throw new Error("Empty access_token");
    }

    const apiOptions = {
      baseUrl,
      app_id: "asdfjjshdsafj23h2",
      app_secret: "qerqwershdsafj23h2sdfaasdf",
      token,
      // keep for potential future usage/debugging
      activityId,
      code,
    };

    const exchange = new GoldCoinsExchange({
      apiOptions,
      onExchangeSuccess: (product) => {
        showToast(`Redeemed ${product.name} successfully!`, "success");
      },
      onExchangeFailed: (message) => {
        showToast(message, "error");
      },
    });

    // 返回按钮
    document.getElementById("backBtn").addEventListener("click", () => {
      // Prefer returning with the same token, so activity-center doesn't need to re-exchange a one-time code.
      if (token) {
        window.location.href = `./activity-center.html?token=${encodeURIComponent(token)}&activity_id=${encodeURIComponent(activityId || "")}`;
      } else {
        window.history.back();
      }
    });

    // 显示 Toast
    function showToast(message, type = "info") {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.className = `toast ${type}`;
      toast.style.display = "block";
      setTimeout(() => {
        toast.style.display = "none";
      }, 2000);
    }

    // 初始化页面
    exchange.init();
  </script>
</body>

</html>
