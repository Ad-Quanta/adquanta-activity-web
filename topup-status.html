<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Top-up Status</title>
  <link rel="stylesheet" href="./topup-status.css" />
</head>

<body>
  <div class="ts-root" data-status="pending">
    <header class="ts-header" id="tsHeader">
      <button type="button" id="tsBackBtn" class="ts-back-btn" aria-label="Back">←</button>
      <h1 class="ts-title">Top-up Status</h1>
      <div class="ts-header-spacer"></div>
    </header>

    <main class="ts-main">
      <section class="ts-status-card">
        <div class="ts-status-icon-wrap">
          <div class="ts-status-icon" id="tsStatusIcon">↻</div>
        </div>
        <h2 class="ts-status-title" id="tsStatusTitle">Processing Recharge</h2>
        <p class="ts-status-desc" id="tsStatusDesc">We are processing your top-up. This may take a few minutes.</p>
      </section>

      <section class="ts-detail-card">
        <div class="ts-row">
          <span class="ts-label">Transaction ID</span>
          <span class="ts-value" id="tsTransactionId">-</span>
        </div>
        <div class="ts-divider"></div>
        <div class="ts-row">
          <span class="ts-label">Amount</span>
          <span class="ts-value" id="tsAmount">-</span>
        </div>
        <div class="ts-row">
          <span class="ts-label">Mobile Number</span>
          <span class="ts-value" id="tsPhone">-</span>
        </div>
        <div class="ts-row">
          <span class="ts-label">Operator</span>
          <span class="ts-value" id="tsOperator">-</span>
        </div>
      </section>

      <section class="ts-tip-card" id="tsTipCard">
        <div class="ts-tip-icon">🕒</div>
        <div>
          <div class="ts-tip-title">Average Processing Time</div>
          <div class="ts-tip-desc">Typically under 2 minutes.</div>
        </div>
      </section>

      <button id="tsHelpBtn" type="button" class="ts-primary-btn">
        <span id="tsPrimaryActionIcon" class="ts-primary-btn-icon" hidden>📋</span>
        <span id="tsPrimaryActionLabel">Need Help?</span>
      </button>
      <button id="tsReturnBtn" type="button" class="ts-secondary-btn">
        <span id="tsSecondaryActionLabel">Return to Tasks</span>
      </button>
    </main>
  </div>

  <div class="toast" id="toast" style="display:none;"></div>

  <!-- Help & Support modal -->
  <div class="ts-help-overlay" id="tsHelpModal">
    <div class="ts-help-sheet" role="dialog" aria-modal="true" aria-labelledby="tsHelpTitle">
      <div class="ts-help-header">
        <button type="button" id="tsHelpCloseBtn" class="ts-help-back-btn" aria-label="Close">←</button>
        <h2 class="ts-help-title" id="tsHelpTitle">Help & Support</h2>
        <div class="ts-help-header-spacer"></div>
      </div>

      <div class="ts-help-body">
        <div class="ts-help-subtitle">Contact Us</div>

        <div class="ts-help-field">
          <label class="ts-help-label" for="tsHelpName">Your Name</label>
          <input id="tsHelpName" class="ts-help-input" type="text" placeholder="Enter your name" maxlength="60" />
        </div>

        <div class="ts-help-field">
          <label class="ts-help-label" for="tsHelpEmail">Your Email</label>
          <input id="tsHelpEmail" class="ts-help-input" type="email" placeholder="Enter your email" maxlength="80" />
        </div>

        <div class="ts-help-field">
          <label class="ts-help-label" for="tsHelpMessage">
            Message <span class="ts-help-required">*</span>
          </label>
          <div class="ts-help-textarea-wrap">
            <textarea
              id="tsHelpMessage"
              class="ts-help-textarea"
              placeholder="Enter your message..."
              maxlength="1000"
              rows="6"
            ></textarea>
            <div class="ts-help-counter">
              <span id="tsHelpMessageCount">0</span>/1000
            </div>
          </div>
        </div>
      </div>

      <div class="ts-help-footer">
        <button type="button" id="tsHelpCancelBtn" class="ts-help-cancel-btn">Cancel</button>
        <button type="button" id="tsHelpSubmitBtn" class="ts-help-submit-btn">Submit</button>
      </div>
    </div>
  </div>

  <script type="module" src="./topup-status.js"></script>
</body>

</html>
